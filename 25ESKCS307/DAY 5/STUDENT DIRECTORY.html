<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="DAY5.css">
</head>
<body class="bg-light">

    <header class="bg-primary text-white text-center py-4 mb-4 shadow-sm">
        <h1 class="display-6 fw-bold m-0">Student Directory</h1>
    </header>

    <div class="container">
        <div class="row mb-4 jus               
        tify-content-center">
            <div class="col-md-6 mb-3">
                <input type="text" id="searchInput" class="form-control form-control-lg border-primary" placeholder="Search by name or email...">
            </div>
            <div class="col-md-4 mb-3">
                <select id="branchFilter" class="form-select form-select-lg border-primary">
                    <option value="All">All Branches</option>
                    <option value="CSE">Computer Science (CSE)</option>
                    <option value="ECE">Electronics (ECE)</option>
                    <option value="IT">Information Tech (IT)</option>
                </select>
            </div>
        </div>

        <div class="row" id="studentGrid">
            </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="DAY5.js"></script>
</body>
</html>
