<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Responsive product directory powered by the DummyJSON Products API." />
  <title>Product Explorer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="hero">
    <div class="container py-5">
      <div class="row align-items-center g-4">
        <div class="col-lg-8">
          <span class="eyebrow"><i class="bi bi-bag-check-fill"></i> Live Products API</span>
          <h1 class="mt-3">Product Explorer</h1>
        </div>
        <div class="col-lg-4">
          <div class="count-card">
            <div>
              <span>Products found</span>
              <strong id="productCount">0</strong>
            </div>
            <i class="bi bi-box-seam-fill"></i>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="container pb-5">
    <section class="toolbar">
      <div class="row g-3">
        <div class="col-lg-5">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input id="searchInput" type="search" class="form-control" placeholder="Search products by name...">
          </div>
        </div>

        <div class="col-md-4 col-lg-3">
          <div class="dropdown custom-select">
            <button
              id="categoryButton"
              class="btn custom-select-button dropdown-toggle w-100"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false">
              <span>All categories</span>
            </button>
            <ul id="categoryMenu" class="dropdown-menu custom-select-menu w-100">
              <li><button class="dropdown-item active" type="button" data-value="all">All categories</button></li>
            </ul>
          </div>
        </div>

        <div class="col-md-4 col-lg-2">
          <div class="dropdown custom-select">
            <button
              id="sortButton"
              class="btn custom-select-button dropdown-toggle w-100"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false">
              <span>Sort by</span>
            </button>
            <ul id="sortMenu" class="dropdown-menu custom-select-menu w-100">
              <li><button class="dropdown-item active" type="button" data-value="default">Sort by</button></li>
              <li><button class="dropdown-item" type="button" data-value="name-az">Name A-Z</button></li>
              <li><button class="dropdown-item" type="button" data-value="name-za">Name Z-A</button></li>
              <li><button class="dropdown-item" type="button" data-value="price-low">Price: Low to High</button></li>
              <li><button class="dropdown-item" type="button" data-value="price-high">Price: High to Low</button></li>
              <li><button class="dropdown-item" type="button" data-value="rating-high">Rating: High to Low</button></li>
            </ul>
          </div>
        </div>

        <div class="col-md-4 col-lg-2 d-grid">
          <button id="refreshBtn" class="btn btn-primary">
            <i class="bi bi-arrow-clockwise me-1"></i> Refresh
          </button>
        </div>
      </div>
    </section>

    <section id="statusArea" class="mt-4" aria-live="polite"></section>
    <section id="productsGrid" class="row g-4 mt-1"></section>
  </main>

  <template id="productTemplate">
    <div class="col-sm-6 col-lg-4 col-xl-3 product-column">
      <article class="product-card h-100">
        <div class="image-wrap">
          <img class="product-image" alt="">
          <span class="discount-badge"></span>
        </div>

        <div class="card-body-custom">
          <span class="category-badge"></span>
          <h2 class="product-title"></h2>
          <p class="product-description"></p>

          <div class="rating-row">
            <div class="stars"></div>
            <span class="rating-value"></span>
          </div>

          <div class="price-row">
            <div>
              <strong class="price"></strong>
              <span class="old-price"></span>
            </div>
            <span class="stock-badge"></span>
          </div>

          <button class="btn btn-outline-light w-100 view-btn" data-bs-toggle="modal" data-bs-target="#productModal">
            View Details
          </button>
        </div>
      </article>
    </div>
  </template>

  <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h2 class="modal-title h4" id="modalTitle"></h2>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-4 align-items-center">
            <div class="col-md-5">
              <img id="modalImage" class="img-fluid rounded-4" alt="">
            </div>
            <div class="col-md-7">
              <span id="modalCategory" class="category-badge"></span>
              <p id="modalDescription" class="mt-3"></p>
              <div class="modal-info">
                <p><strong>Brand:</strong> <span id="modalBrand"></span></p>
                <p><strong>Rating:</strong> <span id="modalRating"></span></p>
                <p><strong>Stock:</strong> <span id="modalStock"></span></p>
                <p><strong>Price:</strong> <span id="modalPrice"></span></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
